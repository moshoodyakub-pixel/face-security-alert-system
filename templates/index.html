<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Design Calculator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Solar System Design Calculator</h1>
    <form action="/calculate" method="post">
        <h2>Appliances</h2>
        <div id="appliances">
            <div class="appliance">
                <input type="text" name="appliance_name[]" placeholder="Appliance Name" required>
                <input type="number" name="quantity[]" placeholder="Quantity" required>
                <input type="number" name="wattage[]" placeholder="Wattage" required>
                <input type="number" name="hours[]" placeholder="Daily Usage (hours)" required>
            </div>
        </div>
        <button type="button" id="add-appliance">Add Appliance</button>

        <h2>Location</h2>
        <input type="text" name="address" placeholder="Address in Nigeria" required>

        <h2>System Voltage</h2>
        <select name="system_voltage">
            <option value="12">12V</option>
            <option value="24">24V</option>
            <option value="48">48V</option>
        </select>

        <button type="submit">Calculate</button>
    </form>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
